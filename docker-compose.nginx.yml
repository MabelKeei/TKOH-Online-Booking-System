# Nginx 入口（蓝绿流量切换）

services:
  nginx:
    image: nginx:alpine
    container_name: tkho-booking-nginx
    restart: unless-stopped
    ports:
      - "3200:80"
      - "3243:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - tkho-booking-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

networks:
  tkho-booking-network:
    external: true
